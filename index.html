<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POC Workspace — Prototypes</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #121827;
      --surface-hover: #1a2233;
      --border: #232c42;
      --text: #e6edf7;
      --text-muted: #8b96ae;
      --accent: #6aa7ff;
      --accent-hover: #8bbcff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", sans-serif;
      line-height: 1.5;
    }
    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 64px 24px;
    }
    header { margin-bottom: 48px; }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 16px;
      margin: 0;
    }
    section { margin-bottom: 48px; }
    h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 0 0 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .card {
      display: block;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .card:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
    }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>POC Workspace</h1>
      <p class="subtitle">Static HTML prototypes and experiments</p>
    </header>

    <section>
      <h2>Searchlaw — Legal AI</h2>
      <div class="grid">
        <a class="card" href="projects/searchlaw/legal-ai-landing.html">
          <p class="card-title">Landing</p>
          <p class="card-desc">หน้าแรกของ Legal AI</p>
        </a>
        <a class="card" href="projects/searchlaw/legal-ai-login.html">
          <p class="card-title">Login</p>
          <p class="card-desc">หน้าเข้าสู่ระบบ</p>
        </a>
        <a class="card" href="projects/searchlaw/legal-ai-chat.html">
          <p class="card-title">Chat</p>
          <p class="card-desc">หน้าสนทนากับ AI</p>
        </a>
        <a class="card" href="projects/searchlaw/legal-ai-components.html">
          <p class="card-title">Components</p>
          <p class="card-desc">Design system components</p>
        </a>
        <a class="card" href="projects/searchlaw/legal-ai-states.html">
          <p class="card-title">States</p>
          <p class="card-desc">Component state variations</p>
        </a>
        <a class="card" href="projects/searchlaw/legal-ai-releases.html">
          <p class="card-title">Releases</p>
          <p class="card-desc">Release notes</p>
        </a>
      </div>
    </section>

    <footer>
      <p>
        Source on
        <a href="https://github.com/natpakans-stack/poc">GitHub</a>
      </p>
    </footer>
  </div>
</body>
</html>
